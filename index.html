<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘星空占卜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 歡迎區塊 -->
        <div id="welcome-screen" class="screen">
            <h1 class="title">🔮 神秘星空占卜 🔮</h1>
            <p class="subtitle">想知道今天的運勢如何嗎？<br>閉上眼睛，深呼吸，點擊水晶球開始為你預測。</p>
            <button id="draw-btn" class="btn magic-btn">開始占卜</button>
        </div>

        <!-- 載入動畫區塊 -->
        <div id="loading-screen" class="screen hidden">
            <div class="crystal-ball-container">
                <div class="crystal-ball">
                    <div class="glow"></div>
                </div>
            </div>
            <p class="loading-text">正在為您連結廣大的宇宙能量...</p>
        </div>

        <!-- 結果區塊 -->
        <div id="result-screen" class="screen hidden">
            <h2 id="result-title" class="result-title">大吉</h2>
            <div class="card-container">
                <div class="result-card">
                    <h3>💼 工作</h3>
                    <p id="desc-work">工作說明</p>
                </div>
                <div class="result-card">
                    <h3>📚 學業</h3>
                    <p id="desc-study">學業說明</p>
                </div>
                <div class="result-card">
                    <h3>❤️ 愛情</h3>
                    <p id="desc-love">愛情說明</p>
                </div>
                <div class="result-card">
                    <h3>💰 金錢</h3>
                    <p id="desc-money">金錢說明</p>
                </div>
            </div>
            <p id="result-quote" class="quote">結語</p>
            <button id="retry-btn" class="btn secondary-btn">↻ 再占卜一次</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
