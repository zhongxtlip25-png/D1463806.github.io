<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神祕星象占卜</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="stars"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="container">
        <!-- 開頭區域 -->
        <section id="intro-section" class="card active">
            <div class="icon-bounce">🔮</div>
            <h1>神祕運勢占卜</h1>
            <p>閉上雙眼，在心中默念你的問題。<br>當你準備好時，請點擊下方按鈕，窺探今日的命運指引。</p>
            <button id="draw-btn" class="glow-on-hover">開始占卜</button>
        </section>

        <!-- 抽取特效區域 (過渡用) -->
        <section id="loading-section" class="card hidden">
            <div class="crystal-ball">✨</div>
            <h2>命運之輪轉動中...</h2>
            <p>正在連結星體的能量，為您解碼命運的軌跡</p>
        </section>

        <!-- 結果區域 -->
        <section id="result-section" class="card hidden">
            <h2 id="result-title" class="title-glow">大吉 🌟</h2>
            <p id="result-desc" class="subtitle">萬事如意，好運連連！</p>
            
            <div class="aspects-container">
                <div class="aspect-card">
                    <h3>💼 工作</h3>
                    <p id="result-work">事業運爆棚...</p>
                </div>
                <div class="aspect-card">
                    <h3>📚 學業</h3>
                    <p id="result-study">思緒宛如泉湧...</p>
                </div>
                <div class="aspect-card">
                    <h3>❤️ 愛情</h3>
                    <p id="result-love">魅力四射...</p>
                </div>
                <div class="aspect-card">
                    <h3>💰 金錢</h3>
                    <p id="result-money">財星高照...</p>
                </div>
            </div>
            
            <div class="quote-box">
                <p id="result-quote">今天是你的超級幸運日！</p>
            </div>
            
            <button id="retry-btn" class="glow-on-hover secondary">再占卜一次</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
