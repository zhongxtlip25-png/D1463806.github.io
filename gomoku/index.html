<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 Gomoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>五子棋</h1>
            <p class="instruction">玩法說明：黑白雙方輪流落子，先在橫、豎、或斜方向連續連成五子者獲勝！</p>
        </header>

        <main>
            <div class="status-panel">
                <div id="turn-indicator" class="turn-indicator">
                    等待開始...
                </div>
                <div id="win-message" class="win-message hidden">
                    <span id="winner-text"></span>
                </div>
                <button id="restart-btn" class="restart-btn">重新開始遊戲</button>
            </div>

            <div class="board-container">
                <div id="board" class="board"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
